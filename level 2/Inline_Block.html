<!DOCTYPE html>
<html>

<head>
    <title>Inline Vs Block</title>
</head>

<body>
    <!-- block -->
    <h1>Hello Roshni</h1>
    <h1>Hello Rani</h1>

    <!-- block -->
    <p>Hello Roshni</p>
    <p>Hello Rani</p>

    <!-- Inline -->
    <a href="www.google.com">Click Google</a>
    <a href="www.youtube.com">Click Youtube</a>
    <br><br>

    <!-- Inline -->
    <img src="Babu.jpg" alt="Babu Image" height="200px" width="200px">
    <img src="Beti.jpg" alt="Beti Image" height="200px" width="200px">
</body>

</html>
