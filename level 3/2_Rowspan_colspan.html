<!DOCTYPE html>
<html lang="en">

<head>
    <title>Table in HTML</title>
</head>

<body>
    <table border="black">
        <!-- caption -->
        <caption><b><u>Food Menu</u></b></caption>

        <!-- table header -->
        <thead>
            <!-- table row   -->
            <tr>
                <!-- table header -->
                <th rowspan="2">Item</th>
                <th colspan="2">price</th>
            </tr>

            <tr>
                <th>Half</th>
                <th>Full</th>
            </tr>
        </thead>

        <!-- table body -->
        <tbody>
            <tr>
                <!-- table data -->
                <td>Samosa</td>
                <td>25</td>
                <td>50</td>
            </tr>

            <tr>
                <td>Maggi</td>
                <td>30</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Dosa</td>
                <td>40</td>
                <td>90</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
