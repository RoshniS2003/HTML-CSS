<!DOCTYPE html>
<html lang="en">

<head>
    <title>Table in HTML</title>
</head>

<body>
    <table>
        <!-- caption -->
        <caption><b><u>Food Menu</u></b></caption>

        <!-- table header -->
        <thead>
            <!-- table row   -->
            <tr>
                <!-- table header -->
                <th>Item</th>
                <th>price</th>
            </tr>
        </thead>

        <!-- table body -->
        <tbody>
            <tr>
                <!-- table data -->
                <td>Samosa</td>
                <td>25</td>
            </tr>

            <tr>
                <td>Maggi</td>
                <td>30</td>
            </tr>
            <tr>
                <td>Dosa</td>
                <td>40</td>
            </tr>
        </tbody>

        <!-- table footer -->
        <!-- sum = 100 -->
    </table>
</body>

</html>
