<!DOCTYPE html>
<html lang="en">

<head>
    <title>Forms</title>
</head>

<body>
    <form action="/action">
        <h3>Feedback Form</h3>

        <label for="name">Name:</label>
        <input type="text" placeholder="write your name" id="name" name="username">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" placeholder="write your email" id="email" name="email">
        <br><br>

        <label for="fd">Message:</label>
        <br>
        <textarea name="your_fd" id="fd" rows="4" cols="30"></textarea>
        <br><br>

        <label for="rating ">Rate us our of 5: </label>
        
        <br>
        <input type="radio" id="one" name="rate" value="1">
        <label for="one">1</label>
        <br>
        <input type="radio" id="two" name="rate" value="2">  
        <label for="two">2</label>
        <br>
        <input type="radio" id="three"  name="rate" value="3">
        <label for="three">3</label>
        <br>
        <input type="radio" id="four" name="rate" value="4">
        <label for="four">4</label>
        <br>
        <input type="radio" id="five" name="rate" value="5">
        <label for="five">5</label>

        <br><br>
        <button>Send your Message!</button>
    </form>
</body>

</html>
