<!DOCTYPE html>
<html>

<head>
    <title>Range</title>
</head>

<body>
    <form action="/action">

        <label for="vol"> Select Your Volume level:</label>
        <input type="range" id="vol" min="0" max="100" name="vol" value="80">
        <br>
        <label for="feedback">Please give your valuable feedback:</label>
        <textarea name="feedback" id="feedback" placeholder="Write your feedback here" rows="5" cols="50"></textarea>
        <br>
        <button type="submit">Submit</button>
        
    </form>
</body>

</html>
