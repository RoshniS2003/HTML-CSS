<!DOCTYPE html>
<html>
    <head>
        <title>Color System</title>
    </head>
    <body>
        <!-- color name -->
        <h1 style="color: red;">Hello</h1>

        <!-- RGB(Red Green Blue) -->
         <!-- (0-255) -->
        <h1 style="color: rgb(0, 0, 255);">World!!!</h1>
        <h1 style="color: rgb(255, 0, 255);">World!!!</h1>
        <h1 style="color: rgb(255, 255, 0);">World!!!</h1>

        <!-- Hexadecimal & Hexcode -->
         <!-- (00-ff) -->
        <h1 style="color: #ffffff; background-color: #000000;">This is a h1 heading.</h1>
    </body>
</html>
