<!DOCTYPE html>
<html lang="en">

<head>
    <title>practices Que</title>
</head>

<body>
 <form action="/action">
    <label for="username">Name:</label>
    <input type="text" placeholder="Enter name" id="username" name="user">
    <label for="pwd">password:</label>
    <input type="password"  id="pwd" name="password" placeholder="password">
    
    <input type="checkbox" name="age" id="check" checked>
    <label for="check">Age:18+</label>
<br><br>
<label>
    Gender:
    <input type="radio" name="gender" id="m" value="male">
    <label for="m">male</label>
    <input type="radio" name="gender" id="fe" value="female">
    <label for="fe">Female</label>
    <input type="radio" name="gender" id="oth" value="others">
    <label for="oth">others</label>
</label>
    <br>
    <label>
        Chhose your subjects:
    <input type="checkbox" name="subj" id="m" value="maths">
    <label for="m">maths</label>
    <input type="checkbox" name="subj" id="b" value="bio">
    <label for="b">biology</label>
    <input type="checkbox" name="subj" id="c" value="chemistry">
    <label for="c">chemistry</label>
</label>
<br><br>
<label>
    Choose your subjects:
<select name="sub">
    <option>choose your subj</option>
    <option value="mca" selected>MCA</option>
    <option value="m.tech">M.tech</option>
    <option value="mba">MBA</option>
</select>
</label>
<br><br>
<label for="vol">Select your volumn level:</label>
<input type="range" id="vol" min="0" max="100" name="volume" value="90">
<br><br>
<label>
    Feedback:
    <br>
<textarea name="feedback" placeholder="enter your feedback" rows="5px" cols="100px">
</textarea>
<br><br>
    <button type="Submit">Submit</button>
    <button type="reset">Reset</button>
</label>
 </form>
</body>

</html>
