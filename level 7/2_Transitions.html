<!DOCTYPE html>
<html>

<head>
    <title>Transitions Que</title>
    <style>
        div {
            height: 200px;
            width: 200px;
            background-color: palevioletred;
            transition-duration: 1s;
            transition-delay: 1s;
        }

        div:hover {
            background-color: yellow;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div></div>
   
</body>

</html>
